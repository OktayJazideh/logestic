name: community_app
description: Mineral Haul Platform - Community app (HOUSEHOLD / COOP / OPERATOR)

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mineral_api:
    path: ../packages/mineral_api
  mineral_ui:
    path: ../packages/mineral_ui
  intl: ^0.19.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  http: ^1.2.2

flutter:
  uses-material-design: true
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: ../packages/mineral_ui/assets/fonts/Vazirmatn-Regular.ttf
          weight: 400

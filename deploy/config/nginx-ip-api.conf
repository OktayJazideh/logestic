# Fallback for direct IP access (http://185.36.145.164) — proxies /api to backend.
# Install: sudo cp deploy/config/nginx-ip-api.conf /etc/nginx/sites-available/logestic-ip
#          sudo ln -sf /etc/nginx/sites-available/logestic-ip /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 185.36.145.164 _;

    root /opt/logestic/logestic/apps/web/dist;
    index index.html;

    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /downloads/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

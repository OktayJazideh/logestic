# nginx — hamsahman.ir production (DEPLOY-SAHMAN-1)
# Install: sudo cp deploy/config/nginx-hamsahman.ir.conf /etc/nginx/sites-available/hamsahman.ir
#          sudo ln -sf /etc/nginx/sites-available/hamsahman.ir /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d hamsahman.ir -d www.hamsahman.ir
# Test:    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name hamsahman.ir www.hamsahman.ir;
    return 301 https://hamsahman.ir$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hamsahman.ir;
    ssl_certificate     /etc/letsencrypt/live/hamsahman.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hamsahman.ir/privkey.pem;
    return 301 https://hamsahman.ir$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hamsahman.ir;

    ssl_certificate     /etc/letsencrypt/live/hamsahman.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hamsahman.ir/privkey.pem;

    root /opt/logestic/logestic/apps/web/dist;
    index index.html;

    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /downloads/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

services:
  postgres:
    image: postgres:16
    container_name: mineral-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: mineral
      POSTGRES_PASSWORD: mineral_password
      POSTGRES_DB: mineral_mvp
    volumes:
      - mineral_postgres_data:/var/lib/postgresql/data

volumes:
  mineral_postgres_data:
